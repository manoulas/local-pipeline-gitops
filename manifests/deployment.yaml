apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-pod
  template:
    metadata:
      labels:
        app: flask-pod
    spec:
      containers:
        - name: flask-container
          image: 10.42.0.1:5000/flask-example:e6b519484eaf770a4d3911d34a90495340a0379b
          ports:
            - containerPort: 8080
