apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-pod
  template:
    metadata:
      labels:
        app: flask-pod
    spec:
      containers:
        - name: flask-container
          image: 10.42.0.1:5000/flask-example:0988b7fe5653f26dce58fc9e1ec2b692aecf7306
          ports:
            - containerPort: 8080
